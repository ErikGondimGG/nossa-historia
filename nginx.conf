server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Cache longo para assets com hash no nome ──────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpe?g|gif|webp|ico|svg|mp3|mp4|webm)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA: todas as rotas caem no index.html ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
